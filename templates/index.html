<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>{{ brand_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body data-brand="{{ brand_name }}">

  <!-- ===================== Catalog view ===================== -->
  <main id="app-view">
    <div class="scroll-area" id="scroll-area">

      <div class="identity-row">
        <div class="identity-left">
          <span class="icon-trophy">&#127942;</span>
          <span class="status-dot"></span>
          <span class="brand-handle">{{ brand_handle }}</span>
        </div>
        <button class="icon-btn" id="profile-btn" aria-label="Profile">&#128100;</button>
      </div>

      <div class="search-row">
        <input id="search-input" class="search-input" type="text" placeholder="Search anime..." autocomplete="off" />
        <span class="search-icon">&#128269;</span>
      </div>

      <!-- Available tab -->
      <div id="tab-available">
        <h2 class="section-header"><span class="accent-bar"></span>Available Anime</h2>
        <div id="letter-bar" class="letter-bar"></div>
        <div id="available-groups"></div>
        <p id="available-empty" class="empty-note hidden">No anime found.</p>
      </div>

      <!-- News tab -->
      <div id="tab-news" class="hidden">
        <section id="spotlight-section" class="hidden">
          <h2 class="section-header"><span class="accent-bar"></span>#1 Spotlight</h2>
          <div id="spotlight-card"></div>
        </section>
        <section>
          <h2 class="section-header"><span class="accent-bar"></span>Trending Now</h2>
          <div id="trending-row" class="hscroll"></div>
        </section>
        <section>
          <h2 class="section-header"><span class="accent-bar"></span>Popular</h2>
          <div id="popular-grid" class="grid-2"></div>
        </section>
      </div>

    </div>

    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="available">Available</button>
      <button class="tab-btn" data-tab="news">News</button>
    </nav>
  </main>

  <!-- ===================== Profile view ===================== -->
  <section id="profile-view" class="hidden">
    <div class="profile-topbar">
      <button id="profile-back" class="back-btn">&#8249; back</button>
      <span class="profile-title">Profile</span>
    </div>
    <div class="profile-card" id="profile-card">
      <p class="profile-hint">Loading profile…</p>
    </div>
  </section>

  <!-- ===================== Detail bottom sheet ===================== -->
  <div id="detail-overlay" class="overlay hidden">
    <div class="sheet" id="detail-sheet">
      <div class="sheet-media">
        <img id="detail-poster" src="" alt="" />
        <button id="detail-close" class="close-btn">&#10005;</button>
      </div>
      <div class="sheet-body">
        <h3 id="detail-title" class="sheet-title"></h3>
        <div id="detail-genres" class="genre-row"></div>
        <p id="detail-description" class="sheet-description"></p>

        <div id="detail-action-area"></div>

        <button id="report-open-btn" class="btn btn-outline">&#128681; Report an issue</button>
      </div>
    </div>
  </div>

  <!-- ===================== Set Join Link sheet (admin only) ===================== -->
  <div id="link-overlay" class="overlay hidden">
    <div class="sheet">
      <div class="sheet-body">
        <h3 class="sheet-title">Set Join Link</h3>
        <input id="link-input" class="edit-link-input link-input-full" type="text"
               placeholder="Channel ID, @username, or URL" autocomplete="off" />
        <div class="btn-row">
          <button id="link-cancel" class="btn btn-secondary">Cancel</button>
          <button id="link-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== Report sheet ===================== -->
  <div id="report-overlay" class="overlay hidden">
    <div class="sheet">
      <div class="sheet-body">
        <h3 class="sheet-title">Report an issue</h3>
        <div id="report-reasons" class="reason-list">
          <button class="reason-btn" data-reason="Link isn't working">Link isn't working</button>
          <button class="reason-btn" data-reason="Wrong anime uploaded">Wrong anime uploaded</button>
          <button class="reason-btn" data-reason="Episodes are missing">Episodes are missing</button>
          <button class="reason-btn" data-reason="Poor video quality">Poor video quality</button>
          <button class="reason-btn" data-reason="Wrong channel linked">Wrong channel linked</button>
          <button class="reason-btn" data-reason="Other">Other</button>
        </div>
        <textarea id="report-details" class="report-textarea" maxlength="50" placeholder="Optional details (max 50 char)"></textarea>
        <div class="btn-row">
          <button id="report-cancel" class="btn btn-secondary">Cancel</button>
          <button id="report-submit" class="btn btn-primary">Submit</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
