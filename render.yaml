services:
  - type: web
    name: anime-index
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: WEBAPP_URL
        value: https://anime-index.onrender.com
      - key: LOG_CHANNEL_ID
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_NAME
        value: anime_index

# Storage lives in MongoDB (Atlas free tier works well), not on Render's
# own disk, so nothing here needs a persistent disk. Set MONGODB_URL in
# the dashboard to your Atlas (or other hosted Mongo) connection string.

